# Framework Tracker Registry
# Add new frameworks here to enable automatic upstream release tracking.
# No workflow changes needed — just add an entry and the tracker picks it up.

notifications:
  slack:
    enabled: true
    # The webhook URL is stored as a GitHub Actions secret, not in this file
    # Secret name: SLACK_WEBHOOK_URL
    # The target channel is determined by the webhook URL (configured in Slack)

frameworks:
  vllm:
    github_repo: "vllm-project/vllm"
    tag_prefix: "v"
    config_files:
      - path: ".github/config/image/vllm/ec2-ubuntu.yml"
        prod_image_template: "vllm:{major}.{minor}-gpu-py312-ec2"
        base_image_template: "vllm/vllm-openai:v{version}"
      - path: ".github/config/image/vllm/sagemaker-ubuntu.yml"
        prod_image_template: "vllm:{major}.{minor}-gpu-py312"
        base_image_template: "vllm/vllm-openai:v{version}"
    dockerfiles:
      - path: "docker/vllm/Dockerfile"
        base_image_template: "vllm/vllm-openai:v{version}"
    version_detection: true

  huggingface-vllm:
    github_repo: "vllm-project/vllm"
    tag_prefix: "v"
    config_files:
      - path: ".github/config/image/huggingface-vllm/sagemaker.yml"
        prod_image_template: "huggingface-vllm:server-sagemaker-cuda-v1"
        base_image_template: "public.ecr.aws/deep-learning-containers/vllm:{version}-gpu-py312-cu130-ubuntu22.04-sagemaker-v1.0"
    dockerfiles:
      - path: "docker/huggingface/vllm/Dockerfile"
        base_image_template: "public.ecr.aws/deep-learning-containers/vllm:{version}-gpu-py312-cu130-ubuntu22.04-sagemaker-v1.0"
    huggingface_pypi_packages:
      - package: "transformers"
        config_key: "transformers_version"
        dockerfile_arg: "TRANSFORMERS_VERSION"
      - package: "huggingface-hub"
        config_key: "huggingface_hub_version"
        dockerfile_arg: "HUGGINGFACE_HUB_VERSION"
      - package: "hf-xet"
        config_key: "hf_xet_version"
        dockerfile_arg: "HF_XET_VERSION"
    version_detection: true

  sglang:
    github_repo: "sgl-project/sglang"
    tag_prefix: "v"
    config_files:
      - path: ".github/config/image/sglang/ec2-ubuntu.yml"
        prod_image_template: "sglang:{major}.{minor}-gpu-py312-ec2"
        base_image_template: "lmsysorg/sglang:v{version}"
      - path: ".github/config/image/sglang/sagemaker-ubuntu.yml"
        prod_image_template: "sglang:{major}.{minor}-gpu-py312"
        base_image_template: "lmsysorg/sglang:v{version}"
    dockerfiles:
      - path: "docker/sglang/Dockerfile"
        base_image_template: "lmsysorg/sglang:v{version}"
    version_detection: true
