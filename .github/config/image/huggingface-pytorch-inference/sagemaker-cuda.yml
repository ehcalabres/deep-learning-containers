image:
  name: "huggingface-pytorch-inference-sagemaker-cuda"
  description: "Hugging Face PyTorch inference for SageMaker with CUDA"

metadata:
  framework: "huggingface-pytorch"
  framework_version: "2.13.0"
  os_version: "ubuntu24.04"
  customer_type: "sagemaker"
  platform: "sagemaker"
  arch_type: "x86"
  device_type: "gpu"
  job_type: "inference"
  contributor: "huggingface"
  prod_image: "huggingface-pytorch-inference:2.13.0-gpu-py312-cu130-ubuntu24.04-sagemaker-v1"

build:
  dockerfile: "docker/huggingface/pytorch/inference/Dockerfile.gpu"
  target: "huggingface-pytorch-inference-gpu-sagemaker"
  cuda_version: "13.0.2"
  ubuntu_version: "24.04"
  uv_version: "0.11.17"
  torch_version: "2.13.0"
  transformers_version: "5.13.0"
  hf_serve_ref: "f0ca195900fa29e46a965d47de557df7e3e6733b"
  python: "python3.12"
  python_version: "3.12"
  pytorch_index_url: "https://download.pytorch.org/whl/cu130"
  cuda_package_version: "13-0"
  dlc_major_version: "1"
  dlc_minor_version: "0"

release:
  release: true
  force_release: false
  public_registry: false
  private_registry: true
  enable_soci: false
  environment: "production"
