image:
  name: "huggingface-pytorch-inference-sagemaker-cpu"
  description: "Hugging Face PyTorch inference for SageMaker on CPU"

metadata:
  framework: "huggingface-pytorch"
  framework_version: "2.13.0"
  os_version: "ubuntu24.04"
  customer_type: "sagemaker"
  platform: "sagemaker"
  arch_type: "x86"
  device_type: "cpu"
  job_type: "inference"
  contributor: "huggingface"
  prod_image: "huggingface-pytorch-inference:2.13.0-cpu-py312-ubuntu24.04-sagemaker-v1"

build:
  dockerfile: "docker/huggingface/pytorch/inference/Dockerfile.cpu"
  target: "huggingface-pytorch-inference-cpu-sagemaker"
  ubuntu_version: "24.04"
  uv_version: "0.11.17"
  torch_version: "2.13.0"
  transformers_version: "5.13.0"
  hf_serve_ref: "f0ca195900fa29e46a965d47de557df7e3e6733b"
  python: "python3.12"
  python_version: "3.12"
  pytorch_index_url: "https://download.pytorch.org/whl/cpu"
  dlc_major_version: "1"
  dlc_minor_version: "0"

release:
  release: true
  force_release: false
  public_registry: false
  private_registry: true
  enable_soci: false
  environment: "production"
